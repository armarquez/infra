# ProxMox VE 8 Automated Installation Configuration
# This file configures the automated installation of ProxMox VE

# Keyboard layout
keyboard: us

# Country and timezone
country: US
timezone: UTC

# Root password (should match the one in Packer config)
password: changeme

# Email for root user
email: admin@example.com

# Hostname
hostname: proxmox-template

# Network configuration
cidr: dhcp
dns: 8.8.8.8

# Disk configuration
target_hd: /dev/vda
filesystem: ext4

# Enable advanced options
advanced: 1
swapsize: 4
maxroot: 30
minfree: 4

# Install packages for cloud-init support
package-list: cloud-init qemu-guest-agent