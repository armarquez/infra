---
- name: Provision Proxmox VE for Incus
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Wait for system to be ready
      ansible.builtin.command: systemctl is-system-running
      register: system_status
      until: >
        system_status.stdout.find('running') != -1 or
        system_status.stdout.find('degraded') != -1
      retries: 30
      delay: 5
      changed_when: false

    - name: Install cloud-init and guest agent for Incus
      ansible.builtin.apt:
        name:
          - cloud-init
          - qemu-guest-agent
          - cloud-utils
          - cloud-image-utils
          - lxd-agent-loader
        state: present
        update_cache: true

    - name: Clean up machine-id
      ansible.builtin.copy:
        content: ""
        dest: /etc/machine-id
        force: true

    - name: Configure cloud-init for Incus
      ansible.builtin.copy:
        content: |
          datasource_list: [ NoCloud, ConfigDrive, OpenNebula, DigitalOcean, Azure, AltCloud, OVF, MAAS, GCE, OpenStack, CloudSigma, SmartOS, Bigstep, Scaleway, AliYun, Ec2, CloudStack, Hetzner, IBMCloud, Oracle, Exoscale, RbxCloud, UpCloud, VMware, Vultr, LXD ]
          datasource:
            LXD:
              user-data: |
                #cloud-config
                package_upgrade: true
                ssh_pwauth: false
        dest: /etc/cloud/cloud.cfg.d/90-incus.cfg
        mode: '0644'

    - name: Enable required services for Incus
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
      loop:
        - cloud-init
        - qemu-guest-agent
        - cloud-init-local
        - cloud-config
        - cloud-final

    - name: Clean up SSH host keys
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /etc/ssh/ssh_host_rsa_key
        - /etc/ssh/ssh_host_rsa_key.pub
        - /etc/ssh/ssh_host_dsa_key
        - /etc/ssh/ssh_host_dsa_key.pub
        - /etc/ssh/ssh_host_ecdsa_key
        - /etc/ssh/ssh_host_ecdsa_key.pub
        - /etc/ssh/ssh_host_ed25519_key
        - /etc/ssh/ssh_host_ed25519_key.pub

    - name: Clear bash history
      ansible.builtin.file:
        path: /root/.bash_history
        state: absent

    - name: Clear logs
      ansible.builtin.shell: |
        find /var/log -type f -exec truncate -s 0 {} \;
        rm -rf /tmp/*
        rm -rf /var/tmp/*
      changed_when: false

    - name: Zero out free space for compression
      ansible.builtin.shell: |
        dd if=/dev/zero of=/EMPTY bs=1M || true
        rm -f /EMPTY
        sync
      changed_when: false
