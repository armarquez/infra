---
- name: Provision Proxmox VE for Incus
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    # Test basic connectivity using raw commands
    - name: Test basic connectivity
      ansible.builtin.raw: echo "Connection test successful"
      changed_when: false

    # Check system status using raw commands
    - name: Check system status
      ansible.builtin.raw: systemctl is-system-running || echo "System starting"
      register: system_status
      changed_when: false
    # Install essential packages for Incus using raw commands
    - name: Update package lists
      ansible.builtin.raw: apt-get update
      changed_when: false

    - name: Install cloud-init and guest agent packages
      ansible.builtin.raw: apt-get install -y cloud-init qemu-guest-agent cloud-utils cloud-image-utils
      changed_when: true

    # Clean up machine-id using raw commands
    - name: Clean up machine-id
      ansible.builtin.raw: truncate -s 0 /etc/machine-id
      changed_when: true

    # Configure cloud-init for Incus using raw commands
    - name: Configure cloud-init for Incus
      ansible.builtin.raw: |
        cat > /etc/cloud/cloud.cfg.d/90-incus.cfg << 'EOF'
        datasource_list: [ NoCloud, ConfigDrive, OpenNebula, DigitalOcean, Azure, AltCloud, OVF, MAAS, GCE, OpenStack, CloudSigma, SmartOS, Bigstep, Scaleway, AliYun, Ec2, CloudStack, Hetzner, IBMCloud, Oracle, Exoscale, RbxCloud, UpCloud, VMware, Vultr, LXD ]
        datasource:
          LXD:
            user-data: |
              #cloud-config
              package_upgrade: true
              ssh_pwauth: false
        EOF
      changed_when: true

    # Enable required services for Incus using raw commands
    - name: Enable cloud-init services
      ansible.builtin.raw: |
        systemctl enable cloud-init
        systemctl enable qemu-guest-agent
        systemctl enable cloud-init-local
        systemctl enable cloud-config
        systemctl enable cloud-final
      changed_when: true

    # Clean up SSH host keys using raw commands
    - name: Clean up SSH host keys
      ansible.builtin.raw: |
        rm -f /etc/ssh/ssh_host_rsa_key*
        rm -f /etc/ssh/ssh_host_dsa_key*
        rm -f /etc/ssh/ssh_host_ecdsa_key*
        rm -f /etc/ssh/ssh_host_ed25519_key*
      changed_when: true

    # Clean up for template preparation
    - name: Clear bash history and logs
      ansible.builtin.raw: |
        rm -f /root/.bash_history
        find /var/log -type f -exec truncate -s 0 {} \;
        rm -rf /tmp/*
        rm -rf /var/tmp/*
      changed_when: true

    # Zero out free space for compression
    - name: Zero out free space for compression
      ansible.builtin.raw: |
        dd if=/dev/zero of=/EMPTY bs=1M || true
        rm -f /EMPTY
        sync
      changed_when: true
