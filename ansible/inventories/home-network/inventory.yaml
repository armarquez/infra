all:
  children:
    phoenix:
      hosts:
        phoenix-host:
          ansible_host: 192.168.1.240
    plex:
      hosts:
        plex-host:
          ansible_host: 192.168.1.241  # assigned by DHCP after LXC starts — update with static IP
    caddy:
      hosts:
        caddy-host:
          ansible_host: 192.168.1.242  # assigned by DHCP after LXC starts — update with static IP
    cerebro:
      hosts:
        cerebro-host:
          ansible_host: 192.168.1.250
          ansible_user: krakoa
          # DSM ships Python 3.8; ansible-core needs 3.9+. Point at a uv-managed
          # 3.11 venv in krakoa's home that also has the `docker` SDK installed.
          # Bootstrap: docs/cerebro.md → "Ansible-managed services".
          ansible_python_interpreter: /volume1/homes/krakoa/.venvs/ansible/bin/python
