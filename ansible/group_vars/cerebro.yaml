---
# cerebro is a Synology DS1821+; ansible connects as the DSM admin user.
# DSM's docker socket at /var/run/docker.sock is root:root — no docker group
# exists — so the cerebro play in run.yaml uses `become: true` and krakoa
# has passwordless sudo (see /etc/sudoers.d/krakoa on-box).

# Phased migration: only bring up services that don't collide with what's
# already running under Portainer Stacks on cerebro. Add each existing
# service to a per-service takeover task (see tasks/portainer.yml pattern),
# then remove its dir name from this list to enable it.
#
# UIDs confirmed via `id boogey` (1026), `id the-collector` (1028),
# `id krakoa` (1032) on cerebro.
disabled_compose_files:
  - 00-acme-sh              # secrets not in vault; conflicts with running acme.sh
  - 12-olivetin-channels    # deprecated version stanza + PORTAINER_TOKEN interpolation broken

# mqz-cerebro role vars
#
# UID/GID must match the runtime `id` of ansible_user on cerebro (verified by
# the role's preflight). Confirmed via `id krakoa` on cerebro:
#   uid=1032(krakoa) gid=100(users)
cerebro_puid: "1032"
cerebro_pgid: "100"

# Timezone / docker root / dir list all inherit sensible defaults from
# ansible/roles/mqz-cerebro/defaults/main.yml — override only if needed.

# Syncthing declarative peer devices — used by the mqz-cerebro role's
# post-deploy `syncthing.yml` task. Each entry gets PUT to Syncthing's
# /rest/config/devices/{id}. Add a device here, add its `name` to a
# folder's `share_with` list below, and Ansible converges the peer
# relationship on re-runs (no more clicking "Add Device" in the GUI
# after a cerebro re-provision).
syncthing_devices:
  - id: ST2ZEQO-B4BVKE2-ALKXA2Y-2M4WPQG-MNIGOKF-TYGIHWI-HCGE2T2-VQMKWQS
    name: forge   # Anthony's Windows daily-driver laptop

# Syncthing declarative folder list — same task above. Paths are container
# paths; the compose fragment bind-mounts /volume1/docker/syncthing/data →
# /var/syncthing/Sync. `share_with` is a list of device names from
# syncthing_devices above.
syncthing_folders:
  - id: cerebro-sync
    label: Cerebro Sync
    path: /var/syncthing/Sync
    type: sendreceive
    share_with:
      - forge

# Per-service PUID/PGID — preserve the UIDs each service's existing data
# on cerebro is already owned by. If any of these change, existing data
# under /volume1/docker/<service>/ needs to be chowned to match, or the
# service won't be able to read its own files.
calibre_puid: "1026"
calibre_pgid: "100"
channels_dvr_puid: "1028"
channels_dvr_pgid: "100"
iptv_boss_puid: "1028"
iptv_boss_pgid: "100"
the_collector_puid: "1028"
the_collector_pgid: "100"
