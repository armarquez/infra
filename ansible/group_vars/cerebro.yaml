---
# cerebro is a Synology DS1821+; ansible connects as the DSM admin user.
# The Container Manager package (Synology's Docker) exposes the daemon socket
# to the docker group. `krakoa` is a member of that group — no `become: true`
# needed for docker operations.

# mqz-cerebro role vars
#
# UID/GID must match the runtime `id` of ansible_user on cerebro (verified by
# the role's preflight). Confirmed via `id krakoa` on cerebro:
#   uid=1032(krakoa) gid=100(users)
cerebro_puid: "1032"
cerebro_pgid: "100"

# Timezone / docker root / dir list all inherit sensible defaults from
# ansible/roles/mqz-cerebro/defaults/main.yml — override only if needed.

# Syncthing declarative folder list — used by the mqz-cerebro role's
# post-deploy `syncthing.yml` task. Paths are container paths; the compose
# fragment bind-mounts /volume1/docker/syncthing/data → /var/syncthing/Sync.
# Add more folders here to have Ansible converge them via the REST API.
syncthing_folders:
  - id: cerebro-sync
    label: Cerebro Sync
    path: /var/syncthing/Sync
    type: sendreceive

# Per-service PUID/PGID — preserve the UIDs each service's existing data
# on cerebro is already owned by. If any of these change, existing data
# under /volume1/docker/<service>/ needs to be chowned to match, or the
# service won't be able to read its own files.
calibre_puid: "1026"
calibre_pgid: "100"
channels_dvr_puid: "1028"
channels_dvr_pgid: "100"
iptv_boss_puid: "1028"
iptv_boss_pgid: "100"
