---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Install mock pveversion command
      ansible.builtin.copy:
        dest: /usr/local/bin/pveversion
        content: |
          #!/bin/bash
          echo "pve-manager/9.1-1/1234567890abcdef (running kernel: 6.8.12-1-pve)"
        mode: "0755"

    - name: Install mock proxmox-boot-tool command
      ansible.builtin.copy:
        dest: /usr/local/bin/proxmox-boot-tool
        content: |
          #!/bin/bash
          exit 0
        mode: "0755"

    - name: Ensure /etc/kernel directory exists
      ansible.builtin.file:
        path: /etc/kernel
        state: directory
        mode: "0755"

    - name: Create stub EFI kernel cmdline (not present in container)
      ansible.builtin.copy:
        dest: /etc/kernel/cmdline
        content: "quiet"
        mode: "0644"
        force: false
