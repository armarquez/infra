---
# Pre-deploy Calibre-Web-Automated takeover.
#
# Same pattern as portainer.yml: if a container with the same name exists
# and doesn't already carry a compose project label, remove it so
# `docker compose up` can create its replacement with the identical bind
# mounts. Data at {{ cerebro_docker_root }}/calibre/{config,library,ingest}
# is preserved — those are host paths, not Docker volumes.

- name: Look up existing "calibre-web-automated" container
  community.docker.docker_container_info:
    name: calibre-web-automated
  register: cerebro_calibre_existing
  failed_when: false
  changed_when: false

- name: Remove pre-Ansible calibre-web-automated container (bind-mount data preserved)
  community.docker.docker_container:
    name: calibre-web-automated
    state: absent
  when:
    - cerebro_calibre_existing.container is not none
    - cerebro_calibre_existing.container is defined
    - (cerebro_calibre_existing.container.Config.Labels | default({}))['com.docker.compose.project'] is not defined
