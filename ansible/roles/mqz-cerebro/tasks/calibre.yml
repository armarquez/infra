---
# Pre-deploy Calibre-Web-Automated takeover.
#
# Same pattern as portainer.yml: remove any existing container by this name
# unless it's already part of our compose project. Data at
# {{ cerebro_docker_root }}/calibre/{config,library,ingest} is preserved —
# those are host bind mounts, not Docker volumes.

- name: Look up existing "calibre-web-automated" container
  community.docker.docker_container_info:
    name: calibre-web-automated
  register: cerebro_calibre_existing
  failed_when: false
  changed_when: false

- name: Remove pre-Ansible calibre-web-automated container (bind-mount data preserved)
  community.docker.docker_container:
    name: calibre-web-automated
    state: absent
  vars:
    _labels: "{{ cerebro_calibre_existing.container.Config.Labels | default({}) }}"
  when:
    - cerebro_calibre_existing.container is not none
    - cerebro_calibre_existing.container is defined
    - _labels['com.docker.compose.project'] | default('') != cerebro_compose_project_name
