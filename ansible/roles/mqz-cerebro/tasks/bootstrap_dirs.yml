---
- name: Ensure per-service data directories exist
  ansible.builtin.file:
    path: "{{ cerebro_docker_root }}/{{ item.path }}"
    state: directory
    owner: "{{ item.puid }}"
    group: "{{ item.pgid }}"
    mode: "0755"
  loop: "{{ cerebro_service_dirs }}"
  loop_control:
    label: "{{ item.path }}"
