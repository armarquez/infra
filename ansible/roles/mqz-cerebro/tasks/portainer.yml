---
# Pre-deploy Portainer takeover.
#
# Removes any existing `portainer` container that isn't already part of
# our compose project, so `docker compose up` won't hit a name conflict.
# Bind-mounted data at {{ cerebro_docker_root }}/portainer is preserved —
# the compose service re-mounts the same host path.
#
# Pattern for other services being migrated: copy this file, swap the
# container name.

- name: Look up existing "portainer" container
  community.docker.docker_container_info:
    name: portainer
  register: cerebro_portainer_existing
  failed_when: false
  changed_when: false

- name: Remove pre-Ansible portainer container (bind-mount data preserved)
  community.docker.docker_container:
    name: portainer
    state: absent
  vars:
    _labels: "{{ cerebro_portainer_existing.container.Config.Labels | default({}) }}"
  when:
    - cerebro_portainer_existing.container is not none
    - cerebro_portainer_existing.container is defined
    - _labels['com.docker.compose.project'] | default('') != cerebro_compose_project_name
