---
# Post-deploy Syncthing configuration via its REST API.
#
# Pattern for other services with a REST API (Portainer, Home Assistant, etc.):
#   1. Wait for the service to answer on its GUI/API port.
#   2. Discover an auth token — either from the service's on-disk config or from vault.
#   3. Idempotently upsert the desired declarative resources via HTTP.
#
# Docs: https://docs.syncthing.net/rest/config.html

- name: Wait for Syncthing GUI to answer
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 8384
    timeout: 60

- name: Read Syncthing config.xml (holds auto-generated API key + local device id)
  ansible.builtin.slurp:
    src: "{{ cerebro_docker_root }}/syncthing/config/config.xml"
  register: syncthing_config_xml

- name: Extract Syncthing API key and local device id from config.xml
  ansible.builtin.set_fact:
    syncthing_api_key: "{{ syncthing_config_xml.content | b64decode | regex_search('<apikey>([^<]+)</apikey>', '\\1') | first }}"
    syncthing_local_device_id: "{{ syncthing_config_xml.content | b64decode | regex_search('<device id=\"([^\"]+)\"', '\\1') | first }}"

# Devices must be upserted before folders, since folders reference device IDs.
- name: Upsert Syncthing peer devices
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:8384/rest/config/devices/{{ item.id }}"
    method: PUT
    headers:
      X-API-Key: "{{ syncthing_api_key }}"
    body_format: json
    body:
      deviceID: "{{ item.id }}"
      name: "{{ item.name }}"
      addresses: "{{ item.addresses | default(['dynamic']) }}"
      compression: "{{ item.compression | default('metadata') }}"
      autoAcceptFolders: "{{ item.auto_accept_folders | default(false) }}"
    status_code: [200, 204]
  loop: "{{ syncthing_devices | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

# Build name → ID lookup so folder tasks can resolve share_with entries.
- name: Assemble Syncthing device name → ID lookup
  ansible.builtin.set_fact:
    syncthing_device_by_name: >-
      {{
        dict(
          (syncthing_devices | default([]) | map(attribute='name'))
          | zip(syncthing_devices | default([]) | map(attribute='id'))
        )
      }}

- name: Upsert Syncthing folders
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:8384/rest/config/folders/{{ item.id }}"
    method: PUT
    headers:
      X-API-Key: "{{ syncthing_api_key }}"
    body_format: json
    body:
      id: "{{ item.id }}"
      label: "{{ item.label }}"
      path: "{{ item.path }}"
      type: "{{ item.type | default('sendreceive') }}"
      # Local device first; then each peer named in `share_with` resolved
      # via the name→ID lookup and wrapped as {"deviceID": <id>}. The
      # regex_replace + from_json trick sidesteps community.general.dict_kv,
      # which currently uses ansible-core internals slated for removal in
      # ansible-core 2.23/2.24 and triggers deprecation warnings on every run.
      #
      # Note: single-quoted YAML does NOT process backslash escapes, so `\1`
      # (one backslash) is what regex_replace sees as the group-1 reference.
      # `\\1` (as previously written) would put a literal backslash before
      # the ID, producing invalid JSON like `{"deviceID": "\ST2ZEQ..."}` and
      # crashing from_json with "Invalid \escape".
      devices: >-
        {{
          [{'deviceID': syncthing_local_device_id}] +
          (item.share_with | default([])
            | map('extract', syncthing_device_by_name)
            | map('regex_replace', '(.+)', '{"deviceID": "\1"}')
            | map('from_json')
            | list)
        }}
    status_code: [200, 204]
  loop: "{{ syncthing_folders | default([]) }}"
  loop_control:
    label: "{{ item.id }}"
