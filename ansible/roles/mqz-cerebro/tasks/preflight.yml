---
- name: Verify Docker daemon is reachable
  community.docker.docker_host_info:
  register: cerebro_docker_info
  failed_when: cerebro_docker_info.host_info is not defined
  when: cerebro_manage_deploy | default(true)

- name: Look up runtime UID/GID for ansible_user
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"

- name: Assert configured PUID/PGID matches ansible_user's runtime UID/GID
  ansible.builtin.assert:
    that:
      - getent_passwd[ansible_user][1] == (cerebro_puid | string)
      - getent_passwd[ansible_user][2] == (cerebro_pgid | string)
    fail_msg: >-
      cerebro_puid/pgid ({{ cerebro_puid }}/{{ cerebro_pgid }}) does not match
      the runtime id of {{ ansible_user }}
      ({{ getent_passwd[ansible_user][1] }}/{{ getent_passwd[ansible_user][2] }}).
      Update cerebro_puid/cerebro_pgid in group_vars/cerebro.yaml.
    success_msg: "PUID/PGID match runtime id for {{ ansible_user }}."
