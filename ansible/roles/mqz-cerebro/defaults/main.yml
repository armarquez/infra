---
# Host paths on Synology
cerebro_docker_root: /volume1/docker

# Docker CLI location. DSM's Container Manager installs the docker binary at
# /usr/local/bin/docker, which is NOT in root's PATH under sudo, so the
# community.docker.docker_compose_v2 module can't discover it automatically
# when the play runs with become: true. Pass it explicitly.
cerebro_docker_cli: /usr/local/bin/docker

# Runtime user for containers (verify with `id` on the box before assuming)
cerebro_puid: "1028"
cerebro_pgid: "100"

# Timezone (inherits repo-wide default from group_vars/all.yaml)
cerebro_timezone: "{{ timezone }}"

# Feature gates — flip off in molecule to bypass Synology-specific paths / docker
cerebro_manage_dirs: true
cerebro_manage_compose_merge: true
cerebro_manage_deploy: true
# Post-deploy service configuration (Syncthing REST API, etc.)
cerebro_manage_service_config: true
# One-time takeover of manually-created Portainer container (safe no-op after)
cerebro_manage_portainer_takeover: true
# One-time takeover of manually-created calibre-web-automated container (safe no-op after)
cerebro_manage_calibre_takeover: true
# One-time takeover of pre-Ansible channels-dvr-eplustv-1 + pluto-for-channels containers (safe no-op after)
cerebro_manage_channels_dvr_takeover: true

# Which hostname's fragments to merge. Defaults to `cerebro` so molecule
# scenarios using different inventory hostnames still find the fragments.
cerebro_compose_hostname: cerebro

# Where the merged compose file lands on the remote (Ansible SSH user's home)
cerebro_compose_dir: "/home/{{ ansible_user }}"

# Compose project name — takeover tasks compare existing-container project
# labels against this to decide "is this container ours or something else".
# Defaults to the basename of cerebro_compose_dir, matching what docker
# compose would pick automatically. Set explicitly on the deploy task too.
cerebro_compose_project_name: "{{ cerebro_compose_dir | basename }}"

# Service dirs to create under cerebro_docker_root.
# Each entry is a dict — path is relative to cerebro_docker_root; puid/pgid
# are per-service so services with their own owner UID (calibre 1026,
# channels-dvr 1028, etc.) don't get chowned to a wrong owner.
cerebro_service_dirs:
  - path: portainer
    puid: "{{ cerebro_puid }}"
    pgid: "{{ cerebro_pgid }}"
  - path: syncthing/config
    puid: "{{ cerebro_puid }}"
    pgid: "{{ cerebro_pgid }}"
  - path: syncthing/data
    puid: "{{ cerebro_puid }}"
    pgid: "{{ cerebro_pgid }}"
  - path: calibre/config
    puid: "{{ calibre_puid | default('1026') }}"
    pgid: "{{ calibre_pgid | default('100') }}"
  - path: calibre/library
    puid: "{{ calibre_puid | default('1026') }}"
    pgid: "{{ calibre_pgid | default('100') }}"
  - path: calibre/ingest
    puid: "{{ calibre_puid | default('1026') }}"
    pgid: "{{ calibre_pgid | default('100') }}"
  - path: eplustv
    puid: "{{ channels_dvr_puid | default('1028') }}"
    pgid: "{{ channels_dvr_pgid | default('100') }}"
  - path: iptv-boss
    puid: "{{ iptv_boss_puid | default('1028') }}"
    pgid: "{{ iptv_boss_pgid | default('100') }}"
