services:
  caddy:
    # Custom Caddy image with the Cloudflare DNS plugin baked in — needed
    # for the DNS-01 ACME challenge that provisions the *.mqz.casa cert.
    # `serfriz/caddy-cloudflare-dns` (the original choice) was removed from
    # Docker Hub; swapped to `iarekylew00t/caddy-cloudflare` which is
    # actively maintained by an xcaddy-adjacent maintainer and exposes the
    # same `CLOUDFLARE_API_TOKEN` env-var convention.
    image: iarekylew00t/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    # Host network preserves real client source IPs so the Caddyfile's
    # LAN + Tailscale allowlist (`@denied not remote_ip ...`) works. Under
    # Docker bridge networking, Synology's Container Manager rewrites the
    # source IP to the Docker bridge gateway, which would block every
    # legit client. Host mode has no `ports:` block — Caddy binds directly
    # to the ports declared in the Caddyfile global block (http_port,
    # https_port). DSM's nginx still owns 80/443, so Caddy uses 8880/4443
    # per the alt-ports scheme from PR #54.
    network_mode: host
    environment:
      TZ: "{{ cerebro_timezone }}"
      CLOUDFLARE_API_TOKEN: "{{ cloudflare_caddy_api_token }}"
    volumes:
      - "{{ cerebro_docker_root }}/caddy/config:/etc/caddy"
      - "{{ cerebro_docker_root }}/caddy/data:/data"
      - "{{ cerebro_docker_root }}/caddy/site-config:/config"
      # Access logs — file destination for the global `log` directive in
      # the Caddyfile. Bind-mount lets us tail from the host without
      # exec-ing into the container.
      - "{{ cerebro_docker_root }}/caddy/logs:/var/log/caddy"
