services:
  caddy:
    # Custom Caddy image with the Cloudflare DNS plugin baked in — needed
    # for the DNS-01 ACME challenge that provisions the *.mqz.casa cert.
    # `serfriz/caddy-cloudflare-dns` (the original choice) was removed from
    # Docker Hub; swapped to `iarekylew00t/caddy-cloudflare` which is
    # actively maintained by an xcaddy-adjacent maintainer and exposes the
    # same `CLOUDFLARE_API_TOKEN` env-var convention.
    image: iarekylew00t/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    # Host-side alt ports because DSM's nginx already owns 80/443 on cerebro
    # (Application Portal default listener). 8443 is not usable either —
    # code-server binds it. When Caddy moves to phoenix (no DSM there),
    # remap back to 80/443 for clean URLs.
    ports:
      - 8880:80
      - 4443:443
      - 4443:443/udp
    environment:
      TZ: "{{ cerebro_timezone }}"
      CLOUDFLARE_API_TOKEN: "{{ cloudflare_caddy_api_token }}"
    volumes:
      - "{{ cerebro_docker_root }}/caddy/config:/etc/caddy"
      - "{{ cerebro_docker_root }}/caddy/data:/data"
      - "{{ cerebro_docker_root }}/caddy/site-config:/config"
