services:
  acme-sh:
    image: neilpang/acme.sh
    #user: "${PUID:-1030}:${PGID:-101}"
    container_name: acme.sh
    network_mode: host
    command: daemon
    stdin_open: true
    tty: true
    restart: no
    environment:
      PUID: "1030"
      PGID: "101"
      # acme.sh talks to Cloudflare's DNS API for the ACME DNS-01 challenge
      # and then pushes the resulting cert into DSM's Certificate Manager
      # via the `certadmin` account (SYNO_* env vars are acme.sh's DSM
      # deploy-hook contract).
      CF_Token: "{{ cloudflare_dns_api_token }}"
      SYNO_USERNAME: "certadmin"
      SYNO_PASSWORD: "{{ certadmin_password }}"
      SYNO_CERTIFICATE: "Let's Encrypt"
      SYNO_CREATE: 1
      SYNO_SCHEME: "https"
      SYNO_PORT: "5001"
    volumes:
    - /volume1/docker/acme-sh:/acme.sh
